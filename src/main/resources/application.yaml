spring:
  application:
    name: gestao_vagas
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gestao_vagas}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Configurações de Segurança Personalizadas
security:
  token:
    secret: ${SECURITY_TOKEN_SECRET}
    secret-candidate: ${SECURITY_TOKEN_CANDIDATE}

# Tokens Externos
token:
  sonnarqube: ${TOKEN_SONARQUBE}

# Monitoramento (Actuator/Prometheus)
management:
  endpoints:
    access:
      default: none
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      access: unrestricted
      show-details: always
    metrics:
      access: unrestricted
    prometheus:
      access: unrestricted